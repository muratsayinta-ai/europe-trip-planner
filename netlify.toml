[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: every route serves index.html (the app router takes over client-side).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache the service worker or the HTML shell, so updates roll out immediately.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"
